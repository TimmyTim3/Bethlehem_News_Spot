{% extends "base.html" %}

{% block title %}
Manage Articles
{% endblock %}

{% block content %}

<h1>Manage Articles</h1>

<table border="1" cellpadding="8">

<tr>

<th>ID</th>

<th>Title</th>

<th>Category</th>

<th>Author</th>

<th>Actions</th>

</tr>

{% for article in articles %}

<tr>

<td>{{ article.id }}</td>

<td>{{ article.title }}</td>

<td>{{ article.category }}</td>

<td>{{ article.author }}</td>

<td>

<a href="{{ url_for('articles.article', article_id=article.id) }}">
View
</a>

|

<a href="{{ url_for('admin.edit_article', article_id=article.id) }}">
Edit
</a>

</td>

</tr>

{% endfor %}

</table>

{% endblock %}
