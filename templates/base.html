<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Bethlehem News Spot{% endblock %}</title>

    <!-- Main Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700;900&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet"
href="{{ url_for('static', filename='css/homepage.css') }}">

</head>

<body>

    <!-- ================= HEADER ================= -->

    <header>

        <!-- Top Bar -->
        <div class="top-bar">

            <div class="logo">

                <img src="{{ url_for('static', filename='images/logo.png') }}"
                     alt="Bethlehem News Spot">

            </div>

            <div class="search-box">

<form action="{{ url_for('articles.search') }}" method="GET">

    <input
        type="text"
        name="q"
        placeholder="Search news..."
    >

    <button type="submit">
        Search
    </button>

</form>                       

            </div>

        </div>

        <!-- Navigation -->

<button id="menu-toggle">
    <i class="fa-solid fa-bars"></i>
</button>

        <nav id="main-nav">

            <a href="/">Home</a>

            <a href="/news">News</a>

            <a href="/crime">Crime</a>

            <a href="/politics">Politics</a>

            <a href="/business">Business</a>

            <a href="/education">Education</a>

            <a href="/sports">Sports</a>

            <a href="/health">Health</a>

            <a href="/weather">Weather</a>

            <a href="/contact">Contact</a>

        </nav>

    </header>

    <!-- Breaking News -->

    <!-- Main Content -->

    <main>

        {% block content %}

        {% endblock %}

    </main>

    <!-- Footer -->

    <footer>

        <p>

            © 2026 Bethlehem News Spot | All Rights Reserved

        </p>

    </footer>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>

</body>
</html>
