{% extends "base.html" %}

{% block title %}
{{ article.title }}
{% endblock %}

{% block content %}

<div class="container mt-5">

    <h1>{{ article.title }}</h1>

    <p>
        <strong>Category:</strong>
        {{ article.category }}
    </p>

    <p>
        <strong>Author:</strong>
        {{ article.author }}
    </p>

    <hr>

    <p>{{ article.content }}</p>

</div>

{% endblock %}
