{% extends "base.html" %}

{% block title %}
{{ article.title }}
{% endblock %}

{% block content %}

<h1>{{ article.title }}</h1>

<p><strong>Category:</strong> <a href="{{ url_for('articles.category', category=article.category) }}">{{ article.category }}</a></p>

<p><strong>Author:</strong> {{ article.author }}</p>
{% if article.image %}

<img
src="{{ url_for('static', filename='uploads/' + article.image) }}"
alt="{{ article.title }}">

{% endif %}
<hr>

<p>{{ article.content }}</p>

<hr>
<p>
    <a href="{{ url_for('home.index') }}">
        ← Back to Home
    </a>
</p>

{% endblock %}
