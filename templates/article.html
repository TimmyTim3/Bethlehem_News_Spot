{% extends "base.html" %}

{% block title %}
{{ article.title }}
{% endblock %}

{% block content %}

<div class="container mt-5">

    <h1>{{ article.title }}</h1>

    <p>
        <strong>Category:</strong>
        {{ article.category }}
    </p>

    <p>
        <strong>Author:</strong>
        {{ article.author }}
    </p>

    <hr>

    <p>{{ article.content }}</p>

    <hr>

    <p>
        <a href="{{ url_for('admin.edit_article', article_id=article.id) }}">
            ✏️ Edit Article
        </a>
    </p>

    <form
        action="{{ url_for('admin.delete_article_route', article_id=article.id) }}"
        method="POST"
    >
        <button type="submit">
            🗑 Delete Article
        </button>
    </form>

</div>

{% endblock %}
